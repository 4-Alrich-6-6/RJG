<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Recruiter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../seeker/job-listing.css">
    <link rel="stylesheet" href="recruiter-profile.css">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5b8c51" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ready-Job-Go" />
    <link rel="apple-touch-icon" href="/assets/images/icon-192.png" />
</head>
<body class="recruiter-page recruiter-profile-page">
<script src="../lib/app-loader.js"></script>
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="../public/about-us.html" class="logo-link" aria-label="Go to About Us page">
                <img src="../assets/images/Logo_RJG.png" alt="Ready-Job-Go Logo" class="logo">
            </a>
            <button type="button" class="menu-btn profile-back-btn" id="profileBackBtn" aria-label="Back to dashboard" title="Back">
                <img src="../assets/images/Back.png" alt="Back" class="profile-back-icon" width="35" height="35">
            </button>
        </div>
        <nav class="nav" aria-label="Profile sections">
            <a class="nav-item active" href="../recruiter/recruiter-profile.html">Manage Profile</a>
            <a class="nav-item" href="../recruiter/recruiter-account.html">Your Account</a>
        </nav>
        <div class="logout">Log out</div>
    </aside>

    <main class="main rp-main">
        <div class="rp-card" id="recruiterProfileCard">
            <h1 class="rp-card-title">Recruiter Profile</h1>
            <div class="rp-rows" id="rpRows">
                <div class="rp-row">
                    <span class="rp-label">Name</span>
                    <div class="rp-field">
                        <button type="button" class="profile-edit-btn profile-edit-btn--inline" data-edit="name" aria-label="Edit name">
                            <img src="../assets/images/Pencil.png" alt="Edit" class="profile-edit-icon">
                        </button>
                        <span class="rp-value" id="rpName">—</span>
                    </div>
                </div>
                <div class="rp-row rp-row--plain">
                    <span class="rp-label">Email</span>
                    <div class="rp-field">
                        <span class="rp-value" id="rpEmail">—</span>
                    </div>
                </div>
                <div class="rp-row">
                    <span class="rp-label">Contact Number</span>
                    <div class="rp-field">
                        <button type="button" class="profile-edit-btn profile-edit-btn--inline" data-edit="phone" aria-label="Edit contact number">
                            <img src="../assets/images/Pencil.png" alt="Edit" class="profile-edit-icon">
                        </button>
                        <span class="rp-value" id="rpPhone">—</span>
                    </div>
                </div>
                <div class="rp-row">
                    <span class="rp-label">Address</span>
                    <div class="rp-field">
                        <button type="button" class="profile-edit-btn profile-edit-btn--inline" data-edit="address" aria-label="Edit address">
                            <img src="../assets/images/Pencil.png" alt="Edit" class="profile-edit-icon">
                        </button>
                        <span class="rp-value" id="rpAddress">—</span>
                    </div>
                </div>
                <div class="rp-row">
                    <span class="rp-label">Profile Links</span>
                    <div class="rp-field rp-field--links">
                        <button type="button" class="profile-edit-btn profile-edit-btn--inline" data-edit="links" aria-label="Edit profile links">
                            <img src="../assets/images/Pencil.png" alt="Edit" class="profile-edit-icon">
                        </button>
                        <div class="rp-links" id="rpLinks"><span class="rp-empty">No links added yet.</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div class="rp-modal-overlay" id="rpEditModal" hidden>
        <div class="rp-modal" role="dialog" aria-modal="true" aria-labelledby="rpModalTitle">
            <div class="rp-modal-header">
                <h3 id="rpModalTitle">Edit</h3>
                <button type="button" class="rp-modal-close" id="rpModalClose" aria-label="Close">&times;</button>
            </div>
            <div class="rp-modal-body" id="rpModalBody"></div>
            <div class="rp-modal-actions">
                <button type="button" class="rp-modal-btn rp-modal-btn--cancel" id="rpModalCancel">Cancel</button>
                <button type="button" class="rp-modal-btn rp-modal-btn--save" id="rpModalSave">Save</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../lib/database.js"></script>
    <script src="../lib/auth-guard.js"></script>
    <script src="../lib/app-confirm.js"></script>
    <script src="../lib/app-feedback.js"></script>
    <script src="../lib/error-handler.js"></script>
    <script src="../lib/logout-modal.js"></script>
    <script src="recruiter-profile.js?v=2"></script>
    <script src="../lib/register-sw.js"></script>
</body>
</html>

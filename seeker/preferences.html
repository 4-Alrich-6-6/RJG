<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Preferences — Ready Job Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="job-listing.css">
    <link rel="stylesheet" href="account.css">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3775F0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ready-Job-Go" />
    <link rel="apple-touch-icon" href="/assets/images/icon-192.png" />
    <link rel="icon" href="../assets/images/Logo_RJG.png">
    <style>
        .preferences-form {
            width: 100%;
        }

        /* Mobile styles for rate range inputs */
        @media (max-width: 768px) {
            .rate-range {
                display: grid !important;
                grid-template-columns: auto auto auto auto auto auto !important;
                grid-auto-flow: column !important;
                align-items: center !important;
                gap: 2px !important;
                width: 100% !important;
                font-size: 12px !important;
                box-sizing: border-box !important;
            }
            
            .rate-range > * {
                width: auto !important;
                min-width: 0 !important;
                max-width: none !important;
                padding: 4px 2px !important;
                font-size: 12px !important;
                margin: 0 !important;
                box-sizing: border-box !important;
            }
            
            #prefCurrency,
            #prefMinRate,
            #prefMaxRate,
            #prefRateUnit {
                min-width: 55px !important;
                max-width: 65px !important;
            }
            
            /* Make other preference inputs stretch to fill space */
            .preference-field select:not(.rate-range select),
            .preference-field input[type="number"]:not(.rate-range input),
            .preference-field textarea {
                width: 100% !important;
                padding: 6px 8px !important;
                font-size: 12px !important;
                border-radius: 6px !important;
            }
        }
        .preference-field {
            margin-bottom: 20px;
        }
        .preference-field label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: #000;
            margin-bottom: 8px;
            text-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
        }
        .preference-field select,
        .preference-field input[type="number"],
        .preference-field textarea,
        .other-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            background: #fff;
            box-sizing: border-box;
        }
        .preference-field textarea {
            resize: vertical;
            min-height: 100px;
        }
        .rate-range {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .rate-range input[type="number"] {
            flex: 1;
            min-width: 80px;
        }
        .rate-range select {
            width: auto;
            min-width: 70px;
        }
        .save-preferences-btn {
            background: #5b8c51;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 12px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .save-preferences-btn:hover {
            opacity: 0.92;
        }
        .save-preferences-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        @media (max-width: 768px) {
            .rate-range {
                flex-direction: column;
                align-items: stretch;
            }
            .rate-range input,
            .rate-range select {
                width: 100%;
            }
        }
    </style>
</head>
<body class="account-page">
<script src="../lib/app-loader.js"></script>
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="../public/about-us.html" class="logo-link" aria-label="Go to About Us page">
                <img src="../assets/images/Logo_RJG.png" alt="Ready-Job-Go Logo" class="logo">
            </a>
            <button type="button" class="menu-btn profile-back-btn" id="profileBackBtn" aria-label="Back to dashboard" title="Back">
                <img src="../assets/images/Back.png" alt="Back" class="profile-back-icon">
            </button>
        </div>
        <nav class="nav" aria-label="Profile sections">
            <a class="nav-item" href="../seeker/profile.html">Manage Profile</a>
            <a class="nav-item active" href="../seeker/preferences.html" id="preferencesNavItem">Preferences</a>
            <a class="nav-item" href="../seeker/account.html">Your Account</a>
        </nav>
        <div class="logout">Log out</div>
    </aside>

    <main class="main account-main">
        <section class="account-card" aria-labelledby="preferences-heading">
            <h1 id="preferences-heading" class="account-card-title">Job Preferences</h1>
            <p style="margin: -12px 0 20px; color: #555; font-family: 'DM Sans', sans-serif; font-size: 14px;">Set your preferred job criteria to help us match you with the right opportunities.</p>

            <form class="preferences-form" id="preferencesForm">
                <div class="preference-field">
                    <label for="prefSchedule">Preferred Schedule</label>
                    <select id="prefSchedule" name="schedule">
                        <option value="">Select schedule...</option>
                    </select>
                </div>

                <div class="preference-field">
                    <label for="prefSetting">Preferred Work Setting</label>
                    <select id="prefSetting" name="setting">
                        <option value="">Select work setting...</option>
                    </select>
                </div>

                <div class="preference-field">
                    <label for="prefType">Preferred Job Category</label>
                    <select id="prefType" name="type">
                        <option value="">Select job category...</option>
                    </select>
                </div>

                <div class="preference-field">
                    <label>Preferred Rate Range</label>
                    <div class="rate-range">
                        <select id="prefCurrency" name="currency">
                            <option value="">Select currency</option>
                        </select>
                        <input type="number" id="prefMinRate" placeholder="Min" min="0">
                        <span>-</span>
                        <input type="number" id="prefMaxRate" placeholder="Max" min="0">
                        <span>per</span>
                        <select id="prefRateUnit" name="rateUnit">
                            <option value="">Select unit</option>
                        </select>
                    </div>
                </div>

                <div class="preference-field">
                    <label for="prefNotes">Additional Notes</label>
                    <textarea id="prefNotes" name="notes" placeholder="Any other preferences or requirements..."></textarea>
                </div>

                <button type="submit" class="save-preferences-btn" id="savePreferencesBtn">Save Preferences</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../lib/database.js"></script>
    <script src="../lib/role-access.js"></script>
    <script src="../lib/auth-guard.js"></script>
    <script src="../lib/app-feedback.js"></script>
    <script src="../lib/error-handler.js"></script>
    <script src="../lib/app-confirm.js"></script>
    <script src="../lib/ban-notification.js"></script>
    <script src="../lib/ban-check.js"></script>
    <script>
        // Hide Job Preferences tab for recruiters and redirect if accessed
        (function() {
            const role = sessionStorage.getItem("rjgUserRole") || localStorage.getItem("rjgUserRole") || "";
            const isRecruiter = role === "recruiter" || role === "employer";
            if (isRecruiter) {
                const prefsNav = document.getElementById("preferencesNavItem");
                if (prefsNav) prefsNav.style.display = "none";
                // Redirect recruiters to profile page
                window.location.href = "../seeker/profile.html";
            }
        })();
    </script>
    <script src="../lib/logout-modal.js"></script>
    <script src="preferences.js"></script>
    <script src="../lib/register-sw.js"></script>
</body>
</html>

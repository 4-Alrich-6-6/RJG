<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="../seeker/job-listing.css">

<body class="application-page notifications-page">
<script src="../lib/app-loader.js"></script>
    <aside class="sidebar sidebar--application">
        <div class="sidebar-top">
            <a href="about-us.html" class="logo-link" aria-label="Go to About Us page">

            <button type="button" class="menu-btn application-back-btn" id="notificationsBackBtn" aria-label="Back" title="Back">

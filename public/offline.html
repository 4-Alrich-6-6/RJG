<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Connection – RJG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #5b8c51;
    --green-dark: #2d5a28;
    --blue: #3775F0;
    --black: #1a1a1a;
  }
  html, body {
    width: 100%; height: 100%;
    font-family: Montserrat, sans-serif;
    background: #fff;
  }

  #rjg-offline {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: #fff;
    padding: 32px;
    text-align: center;
  }

  /* Logo with greyscale offline treatment */
  .offline-logo {
    width: 68px; height: 68px;
    object-fit: contain;
    filter: grayscale(1) opacity(0.35);
    margin-bottom: 4px;
  }

  /* Wifi-off icon (pure CSS) */
  .wifi-icon {
    position: relative;
    width: 64px; height: 50px;
    margin-bottom: 4px;
  }
  .wifi-icon .arc {
    position: absolute;
    border: 3px solid #d1d5db;
    border-bottom: none;
    border-radius: 50% 50% 0 0;
    left: 50%;
    transform: translateX(-50%);
  }
  .wifi-icon .arc1 { width: 64px; height: 32px; top: 0; }
  .wifi-icon .arc2 { width: 42px; height: 21px; top: 10px; }
  .wifi-icon .arc3 { width: 20px; height: 10px; top: 20px; }
  .wifi-icon .dot  {
    position: absolute;
    width: 7px; height: 7px;
    background: #d1d5db;
    border-radius: 50%;
    bottom: 0; left: 50%; transform: translateX(-50%);
  }
  /* Slash line across wifi icon */
  .wifi-icon .slash {
    position: absolute;
    width: 3px; height: 72px;
    background: #ef4444;
    border-radius: 2px;
    top: -11px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
  }

  .offline-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 3.5px; text-transform: uppercase; color: #bbb;
  }

  .offline-title {
    font-size: 20px; font-weight: 700;
    color: var(--black); line-height: 1.3;
    max-width: 280px;
  }

  .offline-sub {
    font-size: 13px; font-weight: 400;
    color: #888; line-height: 1.7;
    max-width: 260px;
  }

  /* Retry button */
  .retry-btn {
    margin-top: 8px;
    font-family: Montserrat, sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 13px 32px;
    background: var(--green);
    color: #fff;
    border: none; border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.2s, transform 0.15s;
  }
  .retry-btn:hover  { background: var(--green-dark); }
  .retry-btn:active { transform: scale(0.97); }
  .retry-btn.spinning .retry-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pulse ring around wifi icon */
  .pulse-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 2px solid #ef444433;
    animation: ring 2s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.85); opacity: 1; }
    100% { transform: scale(1.4);  opacity: 0; }
  }
  .wifi-wrap {
    position: relative;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#5b8c51" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ready-Job-Go" />
<link rel="apple-touch-icon" href="/assets/images/icon-192.png" />
</head>
<body>

<div id="rjg-offline" role="alert" aria-live="assertive">

  <img src="../assets/images/Logo_RJG.png" alt="Ready-Job-Go Logo" class="offline-logo">
  <div class="wifi-wrap">
    <div class="pulse-ring"></div>
    <div class="wifi-icon">
      <div class="arc arc1"></div>
      <div class="arc arc2"></div>
      <div class="arc arc3"></div>
      <div class="dot"></div>
      <div class="slash"></div>
    </div>
  </div>

  <span class="offline-label">RJG</span>

  <h1 class="offline-title">You’re Offline.</h1>

  <p class="offline-sub">Please check your internet connection and try again.</p>

  <button class="retry-btn" onclick="retryConnection(this)">
    <svg class="retry-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/>
    </svg>
    Try Again
  </button>

</div>

<script>
  function retryConnection(btn) {
    btn.classList.add("spinning");
    btn.disabled = true;
    setTimeout(() => {
      btn.classList.remove("spinning");
      btn.disabled = false;
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 1500);
  }

  // Auto-reload when connection comes back
  window.addEventListener("online", () => window.location.reload());
</script>
<script src="../lib/register-sw.js"></script>
</body>
</html>

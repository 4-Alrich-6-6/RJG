<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reset-password.css">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3775F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Ready-Job-Go" />
  <link rel="apple-touch-icon" href="/assets/images/icon-192.png" />
  <link rel="icon" href="../assets/images/Logo_RJG.png">
</head>
<body>
<script src="../lib/app-loader.js"></script>
  <div class="container">
    <div class="left">
      <div class="banner">
        <img src="../assets/images/Logo_RJG.png" alt="Ready-Job-Go Logo" class="logo">
        <div class="title">
          <h1>READY-JOB-GO</h1>
          <p>A REAL-TIME JOB REQUEST PLATFORM</p>
        </div>
      </div>
    </div>

    <section class="card" aria-labelledby="resetTitle">
      <h2 class="reset-title" id="resetTitle">Input new password...</h2>

      <div class="form-group password-group">
        <label for="newPasswordInput">New Password:</label>
        <div class="password-wrapper">
          <input type="password" id="newPasswordInput" class="password-input" required>
          <button class="toggle-password" type="button" aria-label="Show or hide new password">
            <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="black"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group password-group">
        <label for="confirmPasswordInput">Confirm Password:</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPasswordInput" class="password-input" required>
          <button class="toggle-password" type="button" aria-label="Show or hide confirm password">
            <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="black"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="button" class="submit-btn" id="resetSubmitBtn" disabled>LOG-IN</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../lib/database.js"></script>
  <script src="../lib/app-feedback.js"></script>
  <script src="../lib/error-handler.js"></script>
  <script src="reset-password.js"></script>
  <script src="../lib/register-sw.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="forgot-password.css">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#5b8c51" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Ready-Job-Go" />
  <link rel="apple-touch-icon" href="/assets/images/icon-192.png" />
  <link rel="icon" href="../assets/images/Logo_RJG.png">
</head>
<body>
<script src="../lib/app-loader.js"></script>
  <div class="container">
    <div class="left">
      <div class="banner">
        <img src="../assets/images/Logo_RJG.png" alt="Ready-Job-Go Logo" class="logo">
        <div class="title">
          <h1>READY-JOB-GO</h1>
          <p>A REAL-TIME JOB REQUEST PLATFORM</p>
        </div>
      </div>
    </div>

    <section class="card" aria-labelledby="verifyTitle">
      <button type="button" class="return-btn" id="forgotReturnBtn">Return</button>
      <h2 class="verify-title" id="verifyTitle">Verifying...</h2>
      <p class="instruction">
        Please enter your Account Email:
      </p>
      <label for="forgotEmailInput" class="label">Email:</label>
      <input type="email" id="forgotEmailInput" class="code-input" autocomplete="email">
      <button type="button" class="enter-btn" id="forgotEnterBtn" disabled>ENTER</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../lib/database.js"></script>
  <script src="../lib/app-feedback.js"></script>
  <script src="../lib/error-handler.js"></script>
  <script src="forgot-password.js"></script>
  <script src="../lib/register-sw.js"></script>
</body>
</html>
